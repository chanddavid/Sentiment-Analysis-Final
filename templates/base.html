<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sentiment Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
      <img src="/static/torrens_logo.png" 
       class="position-absolute top-0 end-0 m-3"
       style="width: 240px; height: auto;" />

      <div class="card shadow p-4" style="width: 500px;">
        <h3 class="text-center mb-3 fw-bold">Sentiment Analyzer</h3>
        <form method="POST">
          
          <div class="mb-3">

            <textarea 
              class="form-control" 
              id="review" 
              name="review"
              rows="5"
              placeholder="Type your review here..."
              required></textarea>

            <div class="form-text">
              We will analyze whether your review is positive or negative.
            </div>
          </div>

          <div class="d-grid gap-2">
            <button type="button" class="btn btn-primary" id="submitBtn" onclick="showModal()">
              Analyze
            </button>
          </div>

        </form>
      </div>
    </div>

    <!--  Modal -->
    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title">Sentiment Result</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body text-center">
            <h6 id="resultText"></h6>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
              Close
            </button>
          </div>

        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const review = document.getElementById('review');
        const buttonsub = document.getElementById('submitBtn');

        review.addEventListener('input', function () {
          buttonsub.disabled = review.value.trim().length === 0;
        });

        function showModal() {
          const reviewText = review.value.trim();

          if (reviewText === '') {
            alert('Please enter a review.');
            return;
          }

          document.getElementById("resultText").innerText = "Analyzing...";

          const resultModal = new bootstrap.Modal(
            document.getElementById('resultModal')
          );
          resultModal.show();

          // CALL BACKEND API
          fetch('/predict', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ review: reviewText })
          })
          .then(response => response.json())
          .then(data => {
            document.getElementById("resultText").innerText =
              `Sentiment: ${data.sentiment} (${data.confidence}%)`;
          })
          .catch(error => {
            document.getElementById("resultText").innerText =
              "Error analyzing sentiment.";
          });
        }
      </script>
  </body>
</html>
